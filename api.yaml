  # -----------------------------------------------------------------
  # Reviews
  # -----------------------------------------------------------------
  /reviews:
    post:
      tags: [Reviews]
      summary: Submit a card review rating
      description: |
        FSRS recalculates the next review interval.
        Rating 1 (Again): due_at is set to now so the card re-appears
        in the study queue on the next fetch. The card cycles back until
        the student gives a passing rating (2-4).
        Ratings 2-4: the card gets a future due_at based on the FSRS interval.
      operationId: submitReview
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitReview"
      responses:
        "200":
          description: Review processed, new schedule returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
        "400":
          description: Rating must be 1-4, or card state not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Card state not found — start a study session first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

