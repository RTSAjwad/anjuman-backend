openapi: "3.0.3"
info:
  title: Anki Classroom API
  description: |
    Backend API for the Anki Classroom spaced repetition platform.
    All authenticated endpoints require a JWT in the `Authorization: Bearer <token>` header.
    Tokens are obtained via `POST /auth/login` and expire after 24 hours.
    Roles: `admin`, `teacher`, `student`.
  version: "0.1.0"

servers:
  - url: http://localhost:3000
    description: Development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # -------------------------------------------------------------------
    # Shared
    # -------------------------------------------------------------------
    MessageResponse:
      type: object
      properties:
        message:
          type: string

    UserRole:
      type: string
      enum: [admin, teacher, student]

    # -------------------------------------------------------------------
    # Auth
    # -------------------------------------------------------------------
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    LoginResponse:
      type: object
      properties:
        token: { type: string, description: "JWT access token, valid 24h" }
        user: { $ref: "#/components/schemas/UserInfo" }

    UserInfo:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        role: { type: string }
        school_id: { type: integer }

    # -------------------------------------------------------------------
    # Users
    # -------------------------------------------------------------------
    CreateUser:
      type: object
      required: [school_id, email, password, role, first_name, last_name]
      properties:
        school_id: { type: integer }
        email: { type: string, format: email }
        password: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
        first_name: { type: string }
        last_name: { type: string }

    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        role: { type: string }
        school_id: { type: integer }

    UpdateUser:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
        first_name: { type: string }
        last_name: { type: string }

    UserDetail:
      type: object
      properties:
        id: { type: integer }
        school_id: { type: integer }
        email: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        role: { type: string }
        created_at: { type: string }

    MeResponse:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        role: { type: string }
        school_id: { type: integer }

    SearchResult:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        role: { type: string }

    # -------------------------------------------------------------------
    # Classes
    # -------------------------------------------------------------------
    CreateClass:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }

    RenameClass:
      type: object
      required: [name]
      properties:
        name: { type: string }

    AddMember:
      type: object
      required: [user_id]
      properties:
        user_id: { type: integer }

    ClassResponse:
      type: object
      properties:
        id: { type: integer }
        school_id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        archived: { type: boolean }
        created_by: { type: integer }
        created_at: { type: string }

    MemberResponse:
      type: object
      properties:
        user_id: { type: integer }
        email: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        role: { type: string }
        joined_at: { type: integer }

    RosterResponse:
      type: object
      properties:
        class: { $ref: "#/components/schemas/ClassResponse" }
        members:
          {
            type: array,
            items: { $ref: "#/components/schemas/MemberResponse" },
          }

    ClassInfo:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }

    # -------------------------------------------------------------------
    # Decks
    # -------------------------------------------------------------------
    CreateDeck:
      type: object
      required: [title]
      properties:
        title: { type: string }
        description: { type: string }

    RenameDeck:
      type: object
      required: [title]
      properties:
        title: { type: string }

    ShareDeck:
      type: object
      required: [user_id]
      properties:
        user_id: { type: integer }

    DeckResponse:
      type: object
      properties:
        id: { type: integer }
        school_id: { type: integer }
        title: { type: string }
        description: { type: string, nullable: true }
        created_by: { type: integer }
        owner_email: { type: string }
        owner_first_name: { type: string }
        owner_last_name: { type: string }
        created_at: { type: string }
        new_count: { type: integer }
        learning_count: { type: integer }
        relearning_count:
          type: integer
          description: Cards in relearning state (rated Again).
        due_count: { type: integer }
        total_count: { type: integer }

    CollaboratorResponse:
      type: object
      properties:
        user_id: { type: integer }
        email: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        shared_at: { type: integer }

    DeckDetailResponse:
      type: object
      properties:
        deck: { $ref: "#/components/schemas/DeckResponse" }
        collaborators:
          {
            type: array,
            items: { $ref: "#/components/schemas/CollaboratorResponse" },
          }
        classes:
          { type: array, items: { $ref: "#/components/schemas/ClassInfo" } }

    # -------------------------------------------------------------------
    # Note Types
    # -------------------------------------------------------------------
    NoteType:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        field_names: { type: array, items: { type: string } }
        templates:
          { type: array, items: { $ref: "#/components/schemas/Template" } }
    Template:
      type: object
      properties:
        index: { type: integer }
        name: { type: string }
        front_pattern: { type: string }
        back_pattern: { type: string }

    # -------------------------------------------------------------------
    # Notes
    # -------------------------------------------------------------------
    CreateNote:
      type: object
      required: [note_type_id, fields]
      properties:
        note_type_id:
          { type: integer, description: "ID of the note type to use" }
        fields:
          { type: object, description: 'e.g. {"Front": "...", "Back": "..."}' }

    UpdateNote:
      type: object
      properties:
        note_type_id: { type: integer }
        fields: { type: object }

    CardSummary:
      type: object
      properties:
        id: { type: integer }
        template_index: { type: integer }
        front: { type: string }
        back: { type: string }

    NoteResponse:
      type: object
      properties:
        id: { type: integer }
        deck_ids:
          {
            type: array,
            items: { type: integer },
            description: "Deck IDs the note's cards are in",
          }
        note_type_id: { type: integer }
        note_type_name: { type: string }
        fields: { type: object }
        cards:
          { type: array, items: { $ref: "#/components/schemas/CardSummary" } }
        created_at: { type: string }

    # -------------------------------------------------------------------
    # Study
    # -------------------------------------------------------------------
    StudyCard:
      type: object
      properties:
        card_id: { type: integer }
        front: { type: string }
        back: { type: string }
        state: { type: string, enum: [new, learning, review, relearning] }
        due_at: { type: integer, nullable: true }
        stability: { type: number, format: double }
        difficulty: { type: number, format: double }
        reps: { type: integer }
        lapses: { type: integer }
        deck_title: { type: string }
        predicted_interval:
          type: object
          nullable: true
          description: "Days until next review for each rating (1=Again,2=Hard,3=Good,4=Easy). Only for students."
          properties:
            "1": { type: integer }
            "2": { type: integer }
            "3": { type: integer }
            "4": { type: integer }

    StudySession:
      type: object
      properties:
        deck_id: { type: integer, nullable: true }
        deck_title: { type: string, nullable: true }
        cards:
          { type: array, items: { $ref: "#/components/schemas/StudyCard" } }
        total_cards: { type: integer }
        reviewed_count: { type: integer }

    # -------------------------------------------------------------------
    # Reviews
    # -------------------------------------------------------------------
    SubmitReview:
      type: object
      required: [card_id, rating]
      properties:
        card_id: { type: integer }
        rating:
          {
            type: integer,
            minimum: 1,
            maximum: 4,
            description: "1=Again, 2=Hard, 3=Good, 4=Easy",
          }
        response_time_ms: { type: integer, nullable: true }

    ReviewResponse:
      type: object
      properties:
        card_id: { type: integer }
        state: { type: string }
        due_at: { type: integer, nullable: true }
        stability: { type: number, format: double }
        difficulty: { type: number, format: double }
        reps: { type: integer }
        lapses: { type: integer }
        interval_days: { type: integer, description: "Days until next review" }

    # -------------------------------------------------------------------
    # Analytics
    # -------------------------------------------------------------------
    StudentStats:
      type: object
      properties:
        student_id: { type: integer }
        total_reviews: { type: integer }
        reviews_today: { type: integer }
        retention_rate: { type: number, format: double }
        average_rating: { type: number, format: double }
        cards_total: { type: integer }
        cards_mastered: { type: integer }
        cards_learning: { type: integer }
        cards_struggling: { type: integer }
        study_streak_days: { type: integer }
        time_spent_today_seconds: { type: integer }
        sessions_this_week: { type: integer }

    DailyPoint:
      type: object
      properties:
        date: { type: string, format: date }
        reviews: { type: integer }
        avg_rating: { type: number, format: double }
        avg_time_ms: { type: number, format: double }

    StudentStatsWithEmail:
      type: object
      properties:
        student_id: { type: integer }
        email: { type: string }
        total_reviews: { type: integer }
        retention_rate: { type: number, format: double }
        cards_mastered: { type: integer }
        last_active: { type: string, format: date, nullable: true }

    DifficultCard:
      type: object
      properties:
        card_id: { type: integer }
        front: { type: string }
        avg_rating: { type: number, format: double }
        total_reviews: { type: integer }

    ClassAnalytics:
      type: object
      properties:
        class_name: { type: string }
        students_enrolled: { type: integer }
        average_retention: { type: number, format: double }
        most_difficult_cards:
          { type: array, items: { $ref: "#/components/schemas/DifficultCard" } }
        students:
          {
            type: array,
            items: { $ref: "#/components/schemas/StudentStatsWithEmail" },
          }

    StudentDetail:
      type: object
      properties:
        student_id: { type: integer }
        email: { type: string }
        total_reviews: { type: integer }
        reviews_today: { type: integer }
        retention_rate: { type: number, format: double }
        average_rating: { type: number, format: double }
        cards_total: { type: integer }
        cards_mastered: { type: integer }
        cards_learning: { type: integer }
        cards_struggling: { type: integer }
        study_streak_days: { type: integer }
        time_spent_today_seconds: { type: integer }
        sessions_this_week: { type: integer }
        daily:
          { type: array, items: { $ref: "#/components/schemas/DailyPoint" } }

    # -------------------------------------------------------------------
    # Dashboard
    # -------------------------------------------------------------------
    ClassCard:
      type: object
      properties:
        class_id: { type: integer }
        name: { type: string }
        student_count: { type: integer }
        avg_retention: { type: number, format: double }
        last_activity: { type: string, format: date, nullable: true }

    AttentionStudent:
      type: object
      properties:
        student_id: { type: integer }
        email: { type: string }
        reason: { type: string, enum: [inactive_7d, low_retention] }
        last_active: { type: string, format: date, nullable: true }
        retention: { type: number, format: double }
        class_name: { type: string }

    DashboardResponse:
      type: object
      properties:
        total_students: { type: integer }
        active_classes: { type: integer }
        reviews_today: { type: integer }
        average_retention: { type: number, format: double }
        classes:
          { type: array, items: { $ref: "#/components/schemas/ClassCard" } }
        attention_needed:
          {
            type: array,
            items: { $ref: "#/components/schemas/AttentionStudent" },
          }

    # -------------------------------------------------------------------
    # Error
    # -------------------------------------------------------------------
    ErrorResponse:
      type: object
      properties:
        error: { type: string }

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient role permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

# ===================================================================
# Paths
# ===================================================================
paths:
  # -----------------------------------------------------------------
  # Health
  # -----------------------------------------------------------------
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      operationId: health
      security: []
      responses:
        "200":
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  # -----------------------------------------------------------------
  # Auth
  # -----------------------------------------------------------------
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive a JWT
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current JWT
      operationId: logout
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # -----------------------------------------------------------------
  # Users
  # -----------------------------------------------------------------
  /users/search:
    get:
      tags: [Users]
      summary: Search users by name or email (teacher or admin)
      description: Case-insensitive contains match on first_name, last_name, or email. Admins are excluded from results. Limited to 20 results.
      operationId: searchUsers
      security: [{ bearerAuth: [] }]
      parameters:
        - {
            name: q,
            in: query,
            required: true,
            schema: { type: string },
            description: "Search query",
          }
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResult"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /users:
    get:
      tags: [Users]
      summary: List all users in the school (admin only)
      operationId: listUsers
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserDetail"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Users]
      summary: Register a new user
      operationId: createUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/{id}:
    get:
      tags: [Users]
      summary: Get a user (admin only, same school)
      operationId: getUser
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Users]
      summary: Update a user's email, password, or role (admin only)
      operationId: updateUser
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUser"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      tags: [Users]
      summary: Delete a user (admin only)
      operationId: deleteUser
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /me:
    get:
      tags: [Users]
      summary: Get the authenticated user's profile
      operationId: me
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }

  # -----------------------------------------------------------------
  # Classes
  # -----------------------------------------------------------------
  /classes:
    get:
      tags: [Classes]
      summary: List classes the caller belongs to
      description: Admins see all classes in their school. Teachers and students see classes they own or are members of.
      operationId: listClasses
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Class list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Classes]
      summary: Create a class (teacher or admin)
      operationId: createClass
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClass"
      responses:
        "201":
          description: Class created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /classes/{id}:
    get:
      tags: [Classes]
      summary: Get a single class (member, owner, or admin)
      operationId: getClass
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Class details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Classes]
      summary: Delete a class (owner or admin)
      operationId: deleteClass
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Class deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /classes/{id}/rename:
    patch:
      tags: [Classes]
      summary: Rename a class (member teacher or admin)
      operationId: renameClass
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameClass"
      responses:
        "200":
          description: Class renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /classes/{id}/archive:
    post:
      tags: [Classes]
      summary: Toggle archive status (member teacher or admin)
      operationId: archiveClass
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Archive status toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /classes/{id}/roster:
    get:
      tags: [Classes]
      summary: View class roster (member, owner, or admin)
      operationId: viewRoster
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Class with member list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RosterResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /classes/{id}/members:
    post:
      tags: [Classes]
      summary: Add a student or teacher to a class (member teacher or admin)
      operationId: addMember
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMember"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /classes/{id}/members/{userId}:
    delete:
      tags: [Classes]
      summary: Remove a member from a class (member teacher or admin)
      operationId: removeMember
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: userId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
